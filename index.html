<!DOCTYPE html>
<html>
<head>
<title>Happy International Women's Day</title>
<style>
body {
      font-family: Arial, sans-serif;
      background: #fff0f6;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      color: #cc0066;
      font-size: 36px;
      margin-bottom: 30px;
    }

    p {
      font-size: 20px;
      color: #444;
      margin: 20px 0;
    }

    /* Bouquet container */
    .bouquet-container {
      position: relative;
      display: inline-block;
      width: 300px;
      height: 300px;
      margin: 20px 0;
      border-radius: 15px;
      overflow: hidden;
    }

    /* Bouquet image */
    .bouquet-container img.bouquet {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
    }

    /* QR overlay */
    .bouquet-container img.qr {
      position: absolute;
      top: 75px; /* Adjust to center QR in bouquet */
      left: 75px;
      width: 150px;
      height: 150px;
      border-radius: 12px; /* optional rounded corners */
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      background: white; /* helps QR scan on busy background */
    }
  </style>
</head>
<body>

<div class="bouquet-container">
  <!-- Realistic bouquet image -->
  <img class="bouquet" src="https://www.shutterstock.com/image-illustration/bridal-bouquet-pink-envelope-gold-rings-2510767425?trackingId=33792e81-a139-4ce7-a68b-b2a27aa7bd9c&listId=searchResults" alt="Bouquet">

  <!-- QR code overlay -->
  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://dannvong.github.io/Flower-1-/" alt="QR Code">
</div>

<h1>🌸 Mừng ngày 🌸</h1>
<h1> Quốc Tế Phụ Nữ </h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Red_rose.jpg">

<p>Hôm nay là ngày của em, nhưng anh thấy may mắn hơn vì có em trong mọi ngày của anh.</p>

</body>
</html>
